server:
  port: 8888

spring:
  application:
    name: api-gateway

  # ── Redis Session ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis
    timeout: 3600s   # expire après 1h

  # ── OAuth2 Client — Keycloak ──
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope:
              - openid
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:fleet-realm}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:fleet-realm}/protocol/openid-connect/token
            jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:fleet-realm}/protocol/openid-connect/certs

  # ── CORS configuré dans CorsConfig.java ──

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# ── Logs ──
logging:
  level:
    com.fleetmanagement.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO


# ══════════════════════════════
# Profil Docker
# ══════════════════════════════
---
spring:
  config:
    activate:
      on-profile: docker

  security:
    oauth2:
      client:
        provider:
          keycloak:
            # URI publique : le navigateur est redirige vers localhost
            authorization-uri: http://localhost:8080/realms/${KEYCLOAK_REALM:fleet-realm}/protocol/openid-connect/auth
            # URI internes utilisees par le conteneur gateway
            token-uri: http://keycloak:8080/realms/${KEYCLOAK_REALM:fleet-realm}/protocol/openid-connect/token
            jwk-set-uri: http://keycloak:8080/realms/${KEYCLOAK_REALM:fleet-realm}/protocol/openid-connect/certs
  
  data:
    redis:
      host: redis
      port: 6379